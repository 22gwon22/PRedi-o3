    *{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#0b2d44 0,#07101f 35%,#050914 100%);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1440px;margin:auto;padding:24px}.card{background:rgba(15,23,42,.86);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.25)}h1{margin:4px 0 8px;font-size:30px}.sub{color:var(--muted);font-size:14px}.top{display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap}.kpis{display:grid;grid-template-columns:repeat(4,110px);gap:10px}.kpi{border-radius:16px;padding:14px;text-align:center;border:1px solid var(--line);background:#0b1220}.kpi b{font-size:30px;display:block}.red{color:var(--red)}.amber{color:var(--amber)}.green{color:var(--green)}.cyan{color:var(--cyan)}button,.file{border:1px solid var(--line);background:#111827;color:var(--text);border-radius:12px;padding:10px 14px;cursor:pointer;font-weight:700;font-size:14px}button:hover,.file:hover{background:#1f2937}.primary{background:var(--cyan);color:#06121f;border-color:var(--cyan)}.danger{color:#fecaca;border-color:#7f1d1d;background:#2a1118}.tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin:18px 0}.tabs button{border-bottom-left-radius:0;border-bottom-right-radius:0}.active{color:var(--cyan);background:#172033}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.msg{margin-top:12px;color:#cffafe;background:#083344;border:1px solid #155e75;padding:10px 12px;border-radius:12px}table{border-collapse:collapse;width:100%;min-width:1180px}th{background:#111827;color:#94a3b8;font-size:12px;text-transform:uppercase;letter-spacing:.06em;text-align:left}td,th{border-bottom:1px solid var(--line);padding:12px;vertical-align:top}tbody tr:hover{background:rgba(255,255,255,.03)}.pill{border-radius:999px;padding:4px 10px;font-size:12px;font-weight:800;display:inline-block;border:1px solid}.alto{background:#3b0d12;color:#fecaca;border-color:#7f1d1d}.medio{background:#3a2a0a;color:#fde68a;border-color:#92400e}.baixo{background:#062e22;color:#bbf7d0;border-color:#047857}.mini{font-size:12px;color:var(--muted)}textarea{width:100%;min-height:200px;background:#020617;color:#dbeafe;border:1px solid var(--line);border-radius:14px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(480px,1fr));gap:14px}.ij{background:#020617;border:1px solid #1f2937;border-radius:12px;padding:8px;margin-bottom:8px}.ij b{font-size:12px}.row-actions{display:flex;gap:8px;flex-wrap:wrap}.small{font-size:12px}.nowrap{white-space:nowrap}.list{margin:0;padding-left:18px}.hist{max-height:520px;overflow:auto}.code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#020617;border:1px solid var(--line);padding:10px;border-radius:12px;color:#cbd5e1;white-space:pre-wrap}

<script>
const exemploEscala=`DATA;PLACA;REBOQUE;ROTA;MOTORISTA;TROCA_DE_TURNO;SAIDA_PROGRAMADA;RETORNO_PREV;TEMPO;NECESSIDADE_MANUTEN;OBSERVACAO_ESCALA
20/05/2026;SDZ9J31;*** - ****;PERDILANDIA 01D;ALISSONELES;***** - *****;08:00:00;17:00:00;12:00:00;BAIXO;
20/05/2026;SDX2H31;*** - ****;PALMA DE OURO 01D;DOUGLAS;WILLIAN;04:00:00;20:00:00;17:00:00;BAIXO;
20/05/2026;AFRG9G30;*** - ****;PA RESERVA 01D;FLAVIO TEIXEIRA;***** - *****;04:00:00;20:00:00;17:00:00;BAIXO;
20/05/2026;TTA2F32;BAM0932;CAPINOPOLIS 01R;RELSON;DENILSON;07:00:00;22:00:00;15:00:00;BAIXO;
20/05/2026;RHF7H26;PVA9G37;MONTE ALEGRE 02R;ANDERSON;***** - *****;06:00:00;22:00:00;15:00:00;BAIXO;`;
const exemploOcorrencias=`DATA;ROTA;PLACA;SAIDA_REAL;FIM_REAL;MOTIVO;OBSERVACAO;STATUS_ROTA;KM_PREVISTO;KM_REALIZADO
19/05/2026;UNIÃO DE MINAS 02D;AFR9G30;04:09:00;;; ;RODANDO;;
19/05/2026;SANTA VITÓRIA 02D;SDX2H31;;;Logística;Caminhão está na descarga - aguardando retorno da filial;ATRASO;;
19/05/2026;CAPINOPOLIS 02D;TTA2F32;07:43:00;;; ;ATRASO;;`;
const exemploDePara=`APELIDO;NOME_CORRETO
ALISSONELES;ALISSONELES DE MOURA PRIMO
WILLIAN;WILLIAN BATISTA DA SILVA
ANDERSON;ANDERSON CLEITON DE LIMA
DOUGLAS;DOUGLAS DOS SANTOS NOGUEIRA
RELSON;RELSON CARLOS ALVES SIQUEIRA
FLAVIO TEIXEIRA;FLAVIO LUIZ TEIXEIRA
DENILSON;DENILSON
MARCOS MARTINS;MARCOS MARTINS`;
const exemploExcecoes=`MOTORISTA;MOTIVO
ANDERSON;Agregado`;
const exemploEquip=`PLACA;STATUS;OBSERVACAO
AFRG9G30;PARADO;
SDX2H31;PARADO;
TTO0I42;MANUTENÇÃO;`;
const exemploParam=`PARAMETRO;VALOR;DESCRICAO
DATA_HOJE;19/05/2026;Dia das ocorrências usadas como base
DATA_AMANHA;20/05/2026;Dia calculado
INTERJORNADA_MINIMA_HORAS;11;Horas mínimas de descanso
DURACAO_PADRAO_HORAS;12;Duração usada quando não houver TEMPO
MARGEM_ALERTA_HORAS;1;Margem de atenção acima da interjornada`;
let state={escala:exemploEscala,ocorr:exemploOcorrencias,depara:exemploDePara,excecoes:exemploExcecoes,equip:exemploEquip,param:exemploParam,historico:JSON.parse(localStorage.getItem('historico_predicao_rotas_cco')||'[]'),tab:'pred'};
const norm=v=>String(v??'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim();
const key=v=>norm(v).replace(/[^A-Z0-9]+/g,'_').replace(/^_+|_+$/g,'');
const placa=v=>norm(v).replace(/[^A-Z0-9]/g,'');
const nomeNorm=v=>norm(String(v??'').replace(/^\s*\(AG\)\s*/i,'')).replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();
function parseCSV(txt){const linhas=String(txt||'').split(/\r?\n/).map(l=>l.trim()).filter(Boolean);if(!linhas.length)return[];const hi=linhas.findIndex(l=>{const n=norm(l);return n.includes('DATA')||n.includes('PARAMETRO')||n.includes('APELIDO')||n.includes('MOTORISTA')||n.includes('PLACA')});const start=hi>=0?hi:0;const headers=linhas[start].split(';').map(key);return linhas.slice(start+1).map(l=>{const c=l.split(';');const o={};headers.forEach((h,i)=>o[h]=(c[i]??'').trim());return o})}
function get(r,arr){for(const n of arr){const v=r[key(n)];if(v!==undefined&&v!==null&&String(v).trim()!=='')return String(v).trim()}return''}
function minHora(h){if(!h||String(h).includes('--')||String(h).trim()==='-')return null;const p=String(h).trim().replace(/h/gi,':').split(':').map(Number);if(p.length<2||Number.isNaN(p[0])||Number.isNaN(p[1]))return null;return p[0]*60+p[1]}
function tempoMin(v){const m=minHora(v);if(m!==null)return m;const n=Number(String(v||'').replace(',','.'));return Number.isNaN(n)?null:n*60}
function dataBR(d){const p=String(d||'').split('/').map(Number);if(p.length!==3||p.some(Number.isNaN))return null;return new Date(p[2],p[1]-1,p[0])}
function dataHora(d,h){const base=dataBR(d),m=minHora(h);if(!base||m===null)return null;return Math.floor(base.getTime()/60000)+m}
function dur(m){if(m===null||m===undefined||Number.isNaN(m))return'sem dados';const s=m<0?'-':'';const a=Math.abs(Math.round(m));return`${s}${String(Math.floor(a/60)).padStart(2,'0')}h${String(a%60).padStart(2,'0')}`}
function hora(abs){if(abs===null||abs===undefined||Number.isNaN(abs))return'estimado';const m=((Math.round(abs)%1440)+1440)%1440;return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`}
function rotaBase(r){return norm(r).replace(/\b0?1[DR]?\b|\b0?2[DR]?\b/g,'').replace(/\s+/g,' ').trim()}
function mapaDePara(txt){const m=new Map();parseCSV(txt).forEach(r=>{const de=get(r,['APELIDO','DE','MOTORISTA']);const para=get(r,['NOME_CORRETO','PARA','NOME COMPLETO']);if(de&&para)m.set(nomeNorm(de),para)});return m}
function nomeCorreto(n,mapa){const limpo=String(n||'').replace(/^\s*\(AG\)\s*/i,'').trim();if(!limpo||/\*{2,}/.test(limpo))return'';return mapa.get(nomeNorm(limpo))||limpo}
function nomesEscala(motorista,troca,mapa){const base=String(motorista||'').split(/\||,|\/| E /i).map(n=>nomeCorreto(n,mapa)).filter(Boolean);const ok=troca&&!/\*{2,}/.test(troca)&&norm(troca)!=='TROCA DE TURNO';const extra=ok?String(troca).split(/\||,|\/| E /i).map(n=>nomeCorreto(n,mapa)).filter(Boolean):[];const f=[...base];extra.forEach(n=>{if(!f.some(x=>nomeNorm(x)===nomeNorm(n)))f.push(n)});return f}
function motoristas(nomes){return nomes.map((nome,i)=>({nome,norm:nomeNorm(nome),indice:i,total:nomes.length,papel:nomes.length===1?'Jornada completa':i===0?'1º turno':i===1?'2º turno':`${i+1}º turno`}))}
function compat(a,b){const na=nomeNorm(a),nb=nomeNorm(b);if(!na||!nb)return false;if(na===nb)return true;const ta=na.split(' ').filter(t=>t.length>=4),tb=nb.split(' ').filter(t=>t.length>=4);const ig=ta.filter(t=>tb.includes(t));return ig.length>=2||(ta.length===1&&ig.length===1)||(tb.length===1&&ig.length===1)}
function excecoes(txt,mapa){const out=new Map();parseCSV(txt).forEach(r=>{const n=get(r,['MOTORISTA','NOME','APELIDO']);const mot=get(r,['MOTIVO','OBSERVACAO'])||'Desconsiderado';if(!n)return;out.set(nomeNorm(n),mot);out.set(nomeNorm(nomeCorreto(n,mapa)),mot)});return out}
function lerEscala(txt,mapa,durP){return parseCSV(txt).map(r=>{const data=get(r,['DATA']),rota=get(r,['ROTA']),inicio=get(r,['SAIDA_PROGRAMADA','SAÍDA PROGRAMADA','SAIDA_ROTEIRIZADA','INICIO']);const tempo=tempoMin(get(r,['TEMPO','DURACAO','DURAÇÃO']));const ret=get(r,['RETORNO_PREV','RETORNO_PREV.','RETORNO PREVISTO']);const ini=dataHora(data,inicio),retAbs=dataHora(data,ret);let fim=null;if(ini!==null&&tempo!==null)fim=ini+tempo;else if(ini!==null&&retAbs!==null)fim=retAbs<=ini?retAbs+1440:retAbs;else if(ini!==null)fim=ini+durP*60;const nomes=nomesEscala(get(r,['MOTORISTA']),get(r,['TROCA_DE_TURNO','TROCA DE TURNO']),mapa);return{data,rota,rotaBase:rotaBase(rota),placa:get(r,['PLACA','CAMINHAO','CAMINHÃO']),placaNorm:placa(get(r,['PLACA','CAMINHAO','CAMINHÃO'])),reboque:get(r,['REBOQUE']),reboqueNorm:placa(get(r,['REBOQUE'])),motorista:nomes.join(' | '),motoristas:motoristas(nomes),inicio,inicioAbs:ini,fimAbs:fim,retornoPrev:fim?hora(fim):'sem previsão',tempoRotaMin:ini!==null&&fim!==null?fim-ini:null,trocaOriginal:get(r,['TROCA_DE_TURNO','TROCA DE TURNO'])}}).filter(r=>r.data&&r.rota&&r.placa)}
function aplicarOc(escala,ocTxt,durP){const oc=parseCSV(ocTxt).map(r=>({rotaBase:rotaBase(get(r,['ROTA'])),placaNorm:placa(get(r,['PLACA'])),saida:get(r,['SAIDA_REAL','SAÍDA_REAL','SAIDA']),fim:get(r,['FIM_REAL','FIM','RETORNO','ENCERRAMENTO']),motivo:get(r,['MOTIVO']),obs:get(r,['OBSERVACAO','OBSERVAÇÃO']),status:get(r,['STATUS_ROTA','STATUS'])}));return escala.map(r=>{const o=oc.find(x=>(x.placaNorm&&x.placaNorm===r.placaNorm)||(x.rotaBase&&x.rotaBase===r.rotaBase));if(!o)return{...r,saidaReal:r.inicio,saidaAbs:r.inicioAbs,fimHojeAbs:r.fimAbs,motivo:'',observacao:'',statusRota:'',desvioMin:null};const s=dataHora(r.data,o.saida||r.inicio);let f=dataHora(r.data,o.fim);if(f!==null&&s!==null&&f<=s)f+=1440;if(f===null&&s!==null)f=s+(r.tempoRotaMin||durP*60);return{...r,saidaReal:o.saida||r.inicio,saidaAbs:s??r.inicioAbs,fimHojeAbs:f??r.fimAbs,motivo:o.motivo,observacao:o.obs,statusRota:o.status,desvioMin:minHora(o.saida)!==null&&minHora(r.inicio)!==null?minHora(o.saida)-minHora(r.inicio):null}})}
function turno(row,m){const ini=row.saidaAbs??row.inicioAbs,fim=row.fimHojeAbs??row.fimAbs;if(ini===null||fim===null)return null;if(m.total<=1)return{inicioAbs:ini,fimAbs:fim};const parte=(fim-ini)/m.total;return{inicioAbs:ini+Math.round(parte*m.indice),fimAbs:m.indice===m.total-1?fim:ini+Math.round(parte*(m.indice+1))}}
function placasTxt(txt){return[...new Set((norm(txt).match(/[A-Z]{3}\d[A-Z0-9]\d{2}/g)||[]).map(placa))]}
function params(){const p={};parseCSV(state.param).forEach(r=>{const k=key(get(r,['PARAMETRO','CHAVE']));const v=get(r,['VALOR']);if(k)p[k]=v});return p}
function gerar(){const p=params(),dataHoje=p.DATA_HOJE||'19/05/2026',dataAmanha=p.DATA_AMANHA||'20/05/2026',durP=Number(p.DURACAO_PADRAO_HORAS||12),interMin=Number(p.INTERJORNADA_MINIMA_HORAS||11)*60,margem=Number(p.MARGEM_ALERTA_HORAS||1)*60;document.getElementById('periodo').textContent=`Base: ${dataHoje} → ${dataAmanha}`;const mapa=mapaDePara(state.depara),ign=excecoes(state.excecoes,mapa),esc=lerEscala(state.escala,mapa,durP),hoje=aplicarOc(esc.filter(r=>r.data===dataHoje),state.ocorr,durP),amanha=esc.filter(r=>r.data===dataAmanha);const bloq=new Map();parseCSV(state.equip).forEach(e=>{const p=placa(get(e,['PLACA']));if(p)bloq.set(p,get(e,['STATUS','SITUACAO'])||'PARADO')});const porPlaca=new Map(),porRota=new Map();hoje.forEach(r=>{const txt=norm(`${r.motivo} ${r.observacao} ${r.statusRota}`);const placas=new Set([r.placaNorm,...placasTxt(txt)]);placas.forEach(p=>{if(!p)return;const arr=porPlaca.get(p)||[];if(/PROBLEMA|CARDAN|ROLAMENTO|MANUTENCAO|DESCARGA|AGUARDANDO|PARADO|QUEBROU|OFICINA|LOGISTICA/.test(txt))arr.push({peso:45,msg:`Ocorrência operacional ligada ao equipamento ${p}: ${r.motivo||r.observacao||r.statusRota}`});if(r.desvioMin!==null&&r.desvioMin>15)arr.push({peso:15,msg:`Saiu ${r.desvioMin} min após o previsto em ${r.rota}`});if(r.desvioMin!==null&&r.desvioMin<-30)arr.push({peso:8,msg:`Saiu ${Math.abs(r.desvioMin)} min antes do previsto em ${r.rota}`});porPlaca.set(p,arr)});const rr=porRota.get(r.rotaBase)||[];if(/DIVERGENCIA|HORARIO DE SAIDA|ROTEIRIZACAO/.test(txt))rr.push({peso:30,msg:'Divergência de roteirização/horário identificada na rota-base'});if(/MAO DE OBRA|MOTORISTA|ADIANTAMENTO/.test(txt))rr.push({peso:18,msg:'Ocorrência de mão de obra/aderência de motorista na rota-base'});porRota.set(r.rotaBase,rr)});return amanha.map(r=>{let score=5;const motivos=[],acoes=[],ijs=[];[r.placaNorm,r.reboqueNorm].filter(Boolean).forEach(p=>{if(bloq.has(p)){score+=50;motivos.push(`${p} está listado como ${bloq.get(p)}`);acoes.push(`Confirmar liberação/substituição do equipamento ${p} antes da escala`)}(porPlaca.get(p)||[]).forEach(pb=>{score+=pb.peso;motivos.push(pb.msg)})});(porRota.get(r.rotaBase)||[]).forEach(pb=>{score+=pb.peso;motivos.push(pb.msg)});const histR=[...state.historico].filter(h=>rotaBase(h.rota)===r.rotaBase||placa(h.placa)===r.placaNorm).slice(-5);if(histR.some(h=>['Alto','Médio'].includes(h.nivel))){score+=12;motivos.push('Histórico recente possui risco médio/alto para a mesma rota ou equipamento.');acoes.push('Comparar com histórico e validar se a causa anterior foi tratada.')};r.motoristas.forEach(ma=>{if(ign.has(ma.norm)){ijs.push({motorista:ma.nome,status:'Desconsiderado',descanso:null,deficit:0,hoje:ign.get(ma.norm),amanha:`${r.rota} • ${ma.papel}`});motivos.push(`Interjornada desconsiderada para ${ma.nome}: ${ign.get(ma.norm)}.`);return}const ta=turno(r,ma);if(!ta)return;const cands=hoje.flatMap(j=>j.motoristas.filter(mh=>compat(mh.norm,ma.norm)).map(mh=>({j,mh,th:turno(j,mh)})));const ult=cands.filter(c=>c.th&&c.th.fimAbs<=ta.inicioAbs).sort((a,b)=>b.th.fimAbs-a.th.fimAbs)[0];if(!ult)return;const descanso=ta.inicioAbs-ult.th.fimAbs,def=interMin-descanso,status=def>0?'Irregular':descanso<=interMin+margem?'Atenção':'OK';ijs.push({motorista:ma.nome,status,descanso,deficit:Math.max(def,0),hoje:`${ult.j.rota} • ${ult.mh.papel} • fim ${hora(ult.th.fimAbs)}`,amanha:`${r.rota} • ${ma.papel} • início ${hora(ta.inicioAbs)}`});if(def>0){score+=55;motivos.push(`Interjornada crítica: ${ma.nome} terá apenas ${dur(descanso)} de descanso. Déficit de ${dur(def)}.`);acoes.push(`Trocar motorista ou ajustar horário para cumprir ${interMin/60}h de interjornada`)}else if(descanso<=interMin+margem){score+=25;motivos.push(`Interjornada em atenção: ${ma.nome} terá ${dur(descanso)} de descanso.`);acoes.push(`Confirmar horário real de fim/início do turno de ${ma.nome}`)}});if(r.inicioAbs!==null&&minHora(r.inicio)<=240){score+=8;motivos.push('Saída muito cedo; pouca janela para corrigir falha antes da rota.')};if(r.tempoRotaMin>=1080){score+=10;motivos.push(`Rota longa pela escala: tempo previsto de ${dur(r.tempoRotaMin)}.`)};if(!motivos.length)motivos.push('Sem impacto direto identificado com os dados importados.');if(score>=60)acoes.push('Acionar operação/logística ainda hoje e deixar plano reserva definido.');else if(score>=35)acoes.push('Validar disponibilidade do equipamento e alinhamento do motorista antes do horário de saída.');else acoes.push('Manter monitoramento normal no controle de saída.');const s=Math.min(score,100);const nivel=s>=60?'Alto':s>=35?'Médio':'Baixo';return{...r,score:s,nivel,motivos:[...new Set(motivos)],acoes:[...new Set(acoes)],interjornadas:ijs}}).sort((a,b)=>b.score-a.score)}
function setMsg(t){const el=document.getElementById('msg');el.style.display='block';el.textContent=t}
function sheetToCsv(sheet){const arr=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,defval:''});return arr.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>r.map(c=>String(c??'').replace(/\r?\n/g,' ')).join(';')).join('\n')}
function achar(wb,nomes){const targets=nomes.map(key);const name=wb.SheetNames.find(n=>targets.includes(key(n)));return name?wb.Sheets[name]:null}
document.getElementById('upload').addEventListener('change',e=>{const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=ev=>{try{const wb=XLSX.read(ev.target.result,{type:'array',cellDates:false});const map=[['escala',['ESCALA_DIA_SEGUINTE','ESCALA_OFICIAL','ESCALA']],['ocorr',['OCORRENCIAS_DIA_ATUAL','OCORRÊNCIAS_DIA_ATUAL','OCORRENCIAS','OCORRÊNCIAS']],['depara',['DE_PARA_MOTORISTAS','DE_PARA','MOTORISTAS']],['excecoes',['EXCECOES_INTERJORNADA','EXCEÇÕES_INTERJORNADA','SEM_INTERJORNADA']],['equip',['EQUIPAMENTOS','FROTA']],['param',['PARAMETROS','PARÂMETROS']]];map.forEach(([k,nomes])=>{const s=achar(wb,nomes);if(s)state[k]=sheetToCsv(s)});const hist=achar(wb,['HISTORICO_ROTAS','HISTÓRICO_ROTAS','HISTORICO']);if(hist){const linhas=parseCSV(sheetToCsv(hist)).map(r=>({data:get(r,['DATA']),rota:get(r,['ROTA']),placa:get(r,['PLACA']),motorista:get(r,['MOTORISTA']),nivel:get(r,['NIVEL_RISCO']),score:Number(get(r,['SCORE'])||0),motivos:get(r,['OBSERVACAO','MOTIVO','MOTIVOS']),acoes:get(r,['ACOES_TOMADAS','AÇÕES']),salvoEm:new Date().toISOString()})).filter(r=>r.rota);state.historico=[...state.historico,...linhas];localStorage.setItem('historico_predicao_rotas_cco',JSON.stringify(state.historico))}setMsg('Arquivo importado: '+file.name);state.tab='pred';render()}catch(err){setMsg('Erro ao importar: '+err.message)}};reader.readAsArrayBuffer(file)});
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{state.tab=b.dataset.tab;render()});
function download(nome,conteudo,type='text/csv;charset=utf-8'){const blob=new Blob([conteudo],{type});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=nome;a.click();URL.revokeObjectURL(url)}
document.getElementById('modelo').onclick=()=>{const wb=XLSX.utils.book_new();const add=(n,csv)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(csv.split(/\r?\n/).map(l=>l.split(';'))),n);add('ESCALA_DIA_SEGUINTE',exemploEscala);add('OCORRENCIAS_DIA_ATUAL',exemploOcorrencias);add('DE_PARA_MOTORISTAS',exemploDePara);add('EXCECOES_INTERJORNADA',exemploExcecoes);add('EQUIPAMENTOS',exemploEquip);add('PARAMETROS',exemploParam);add('HISTORICO_ROTAS','DATA;ROTA;PLACA;REBOQUE;MOTORISTA;INICIO;RETORNO_PREV;TEMPO;NIVEL_RISCO;SCORE;MOTIVOS;ACOES;SALVO_EM');XLSX.writeFile(wb,'PADRAO_IMPORTACAO_PREDICAO_ROTAS_CCO.xlsx')};
document.getElementById('salvar').onclick=()=>{const novos=gerar().map(p=>({data:p.data,rota:p.rota,placa:p.placa,reboque:p.reboque,motorista:p.motorista,inicio:p.inicio,retornoPrev:p.retornoPrev,tempo:dur(p.tempoRotaMin),nivel:p.nivel,score:p.score,motivos:p.motivos.join(' | '),acoes:p.acoes.join(' | '),salvoEm:new Date().toISOString()}));state.historico=[...state.historico,...novos];localStorage.setItem('historico_predicao_rotas_cco',JSON.stringify(state.historico));setMsg(`${novos.length} rotas salvas no histórico local.`);render()};
document.getElementById('exportar').onclick=()=>{const h=['DATA','ROTA','PLACA','REBOQUE','MOTORISTA','INICIO','RETORNO_PREV','TEMPO','NIVEL_RISCO','SCORE','MOTIVOS','ACOES','SALVO_EM'];const linhas=state.historico.map(x=>[x.data,x.rota,x.placa,x.reboque||'',x.motorista,x.inicio||'',x.retornoPrev||'',x.tempo||'',x.nivel,x.score,x.motivos,x.acoes,x.salvoEm].join(';'));download('historico_predicao_rotas.csv',[h.join(';'),...linhas].join('\n'))};
document.getElementById('limpar').onclick=()=>{state.historico=[];localStorage.removeItem('historico_predicao_rotas_cco');setMsg('Histórico local limpo.');render()};
function render(){document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.tab===state.tab));const p=gerar();document.getElementById('kAlto').textContent=p.filter(x=>x.nivel==='Alto').length;document.getElementById('kMedio').textContent=p.filter(x=>x.nivel==='Médio').length;document.getElementById('kBaixo').textContent=p.filter(x=>x.nivel==='Baixo').length;document.getElementById('kInter').textContent=p.filter(x=>x.interjornadas.some(i=>i.status!=='OK'&&i.status!=='Desconsiderado')).length;const c=document.getElementById('content');if(state.tab==='pred'){c.innerHTML='<section class="card">'+(p.length?`<div style="overflow-x:auto"><table><thead><tr><th>Risco</th><th>Rota</th><th>Início</th><th>Motorista</th><th>Placa</th><th>Tempo</th><th>Interjornada</th><th>Motivos</th><th>Ações</th></tr></thead><tbody>${p.map(x=>`<tr><td><span class="pill ${x.nivel==='Alto'?'alto':x.nivel==='Médio'?'medio':'baixo'}">${x.nivel} • ${x.score}</span></td><td><b>${x.rota}</b></td><td class="cyan nowrap">${x.inicio}</td><td>${x.motoristas.map(m=>`${m.nome}${m.total>1?' ('+m.papel+')':''}`).join(' → ')}</td><td class="nowrap"><code>${x.placa}${x.reboque&&!x.reboque.includes('***')?' / '+x.reboque:''}</code></td><td>${dur(x.tempoRotaMin)}<br><span class="mini">Ret. ${x.retornoPrev}</span></td><td>${x.interjornadas.length?x.interjornadas.map(j=>`<div class="ij"><b>${j.status}</b><div class="mini">${j.motorista}</div><div class="mini">Hoje: ${j.hoje}</div><div class="mini">Amanhã: ${j.amanha}</div><div class="mini">Descanso: ${dur(j.descanso)}</div>${j.deficit>0?`<div class="red mini">Déficit: ${dur(j.deficit)}</div>`:''}</div>`).join(''):'<span class="mini">Sem vínculo</span>'}</td><td><ul class="list">${x.motivos.map(m=>`<li>${m}</li>`).join('')}</ul></td><td><ul class="list">${x.acoes.map(a=>`<li>${a}</li>`).join('')}</ul></td></tr>`).join('')}</tbody></table></div>`:'<div class="sub">Nenhuma rota encontrada para DATA_AMANHA. Importe a escala com a data do próximo dia.</div>')+'</section>'}else if(state.tab==='dados'){const fields=[['ESCALA_DIA_SEGUINTE','escala'],['OCORRENCIAS_DIA_ATUAL','ocorr'],['DE_PARA_MOTORISTAS','depara'],['EXCECOES_INTERJORNADA','excecoes'],['EQUIPAMENTOS','equip'],['PARAMETROS','param']];c.innerHTML=`<section class="grid">${fields.map(([t,k])=>`<div class="card"><h3>${t}</h3><textarea data-field="${k}">${state[k]}</textarea></div>`).join('')}</section>`;c.querySelectorAll('textarea').forEach(t=>t.oninput=e=>{state[e.target.dataset.field]=e.target.value;});}else if(state.tab==='hist'){c.innerHTML=`<section class="card"><h2>Histórico local</h2><p class="sub">Fica salvo no navegador. Use Exportar histórico para backup.</p><div class="hist"><table><thead><tr><th>Data</th><th>Rota</th><th>Placa</th><th>Motorista</th><th>Risco</th><th>Score</th><th>Motivos</th></tr></thead><tbody>${[...state.historico].reverse().map(h=>`<tr><td>${h.data||''}</td><td>${h.rota||''}</td><td>${h.placa||''}</td><td>${h.motorista||''}</td><td>${h.nivel||''}</td><td>${h.score||''}</td><td class="mini">${h.motivos||''}</td></tr>`).join('')}</tbody></table></div></section>`}else{c.innerHTML=`<section class="card"><h2>Padrão do Excel</h2><p class="sub">Crie um arquivo .xlsx com estas abas exatas. O botão “Baixar modelo Excel” gera tudo pronto.</p><div class="code">Abas obrigatórias/recomendadas:\n\nESCALA_DIA_SEGUINTE\nOCORRENCIAS_DIA_ATUAL\nDE_PARA_MOTORISTAS\nEXCECOES_INTERJORNADA\nEQUIPAMENTOS\nPARAMETROS\nHISTORICO_ROTAS\n\nA predição usa DATA_HOJE e DATA_AMANHA da aba PARAMETROS.</div></section>`}}
render();
</script>
</body>
</html>
